apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-init-db
  namespace: order-management
spec:
  template:
    spec:
      containers:
      - name: init-db
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          until pg_isready -h postgres-service -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done
          echo "PostgreSQL is ready, creating database..."
          PGPASSWORD="" psql -h postgres-service -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = 'inventory_service_db'" | grep -q 1 || PGPASSWORD="" psql -h postgres-service -U postgres -c "CREATE DATABASE inventory_service_db"
          echo "Database created successfully"
      restartPolicy: Never
  backoffLimit: 3
